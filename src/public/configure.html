<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horror Archive - Configure</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 min-h-screen p-6">
  <div id="app" class="max-w-5xl mx-auto" v-cloak>
    <h1 class="text-4xl font-bold mb-2">🎬 Horror Archive</h1>
    <p class="text-sm text-gray-400 mb-6">v{{ appVersion }} • {{ totalEntries }} entries • {{ totalCatalogs }} catalogs</p>

    <div class="flex gap-2 mb-4">
      <button @click="selectAll" class="bg-red-700 px-4 py-2 rounded">Select all</button>
      <button @click="clearAll" class="bg-gray-700 px-4 py-2 rounded">Clear</button>
    </div>

    <div class="grid md:grid-cols-2 gap-3 mb-6">
      <label
        v-for="catalog in catalogs"
        :key="catalog.id"
        class="border border-gray-800 rounded p-3 cursor-pointer flex items-center justify-between"
      >
        <div>
          <div class="font-semibold">{{ catalog.icon }} {{ catalog.name }}</div>
          <div class="text-xs text-gray-400">{{ catalog.count }} títulos</div>
        </div>
        <input type="checkbox" :value="catalog.id" v-model="selectedCatalogs" />
      </label>
    </div>

    <button
      @click="buildInstall"
      :disabled="selectedCatalogs.length === 0"
      class="bg-red-600 disabled:opacity-50 px-4 py-2 rounded"
    >
      Gerar link de instalação
    </button>

    <div v-if="installUrl" class="mt-4 p-3 bg-gray-900 rounded border border-gray-800">
      <p class="text-xs text-gray-400 mb-2">Addon URL</p>
      <code class="text-xs break-all">{{ installUrl }}</code>
      <div class="mt-3">
        <a :href="stremioUrl" class="underline text-red-400">Abrir no Stremio</a>
      </div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        catalogs: [
          { id: 'halloween', name: 'Halloween Saga', icon: '🎃', count: 13 },
          { id: 'friday_13th', name: 'Friday the 13th', icon: '🔪', count: 12 },
          { id: 'nightmare', name: 'Nightmare on Elm St', icon: '💀', count: 9 },
          { id: 'scream', name: 'Scream Saga', icon: '📞', count: 7 },
          { id: 'chucky_saga', name: 'Chucky Saga', icon: '🔴', count: 8 },
          { id: 'saw', name: 'Saw Legacy', icon: '🧩', count: 10 },
          { id: 'evil_dead', name: 'Evil Dead Saga', icon: '📖', count: 5 },
          { id: 'texas_chainsaw', name: 'Texas Chainsaw', icon: '🪚', count: 9 },
          { id: 'hellraiser', name: 'Hellraiser', icon: '📦', count: 11 },
          { id: 'conjuring_rel', name: 'Conjuring (Release)', icon: '👻', count: 9 },
          { id: 'conjuring_time', name: 'Conjuring (Timeline)', icon: '⏳', count: 9 },
          { id: 'insidious', name: 'Insidious Universe', icon: '🚪', count: 5 },
          { id: 'paranormal', name: 'Paranormal Activity', icon: '📹', count: 7 },
          { id: 'modern_horror', name: 'Modern Horror Sagas', icon: '🎬', count: 13 },
          { id: 'final_dest', name: 'Final Destination', icon: '💀', count: 6 },
          { id: 'resident_evil', name: 'Resident Evil', icon: '🧟', count: 7 },
          { id: 'alien_predator_timeline', name: 'Alien & Predator Timeline', icon: '👽', count: 14 },
          { id: 'a24_horror', name: 'A24 & Indie Horror', icon: '🎨', count: 16 },
          { id: 'classics', name: 'Horror Classics', icon: '👑', count: 51 },
          { id: 'psychological', name: 'Psychological Horror', icon: '🧠', count: 28 },
          { id: 'found_footage', name: 'Found Footage', icon: '📼', count: 21 },
          { id: 'zombies', name: 'Zombie Films', icon: '🧟‍♂️', count: 29 },
          { id: 'asian_horror', name: 'Asian Horror', icon: '🎌', count: 26 },
          { id: 'stephen_king', name: 'Stephen King Collection', icon: '📚', count: 67 },
          { id: 'horror_series', name: 'Horror TV Series', icon: '📺', count: 71 }
        ],
        selectedCatalogs: [],
        installUrl: '',
        stremioUrl: '',
        appVersion: '13.2.3',
        totalEntries: 0,
        totalCatalogs: 0
      },
      async mounted() {
        this.totalEntries = this.catalogs.reduce((sum, c) => sum + c.count, 0);
        this.totalCatalogs = this.catalogs.length;
        this.selectAll();
        await this.loadStats();
      },
      methods: {
        selectAll() {
          this.selectedCatalogs = this.catalogs.map((c) => c.id);
        },
        clearAll() {
          this.selectedCatalogs = [];
          this.installUrl = '';
          this.stremioUrl = '';
        },
        buildInstall() {
          const baseUrl = `${window.location.origin}/${this.selectedCatalogs.join(',')}/manifest.json`;
          this.installUrl = baseUrl;
          this.stremioUrl = `stremio://${baseUrl.replace(/^https?:\/\//, '')}`;
        },
        async loadStats() {
          try {
            const response = await fetch('/catalog-stats.json');
            if (!response.ok) {
              return;
            }

            const stats = await response.json();
            this.appVersion = stats.version || this.appVersion;
            this.totalEntries = stats.totalEntries || this.catalogs.reduce((sum, c) => sum + c.count, 0);
            this.totalCatalogs = stats.totalCatalogs || this.catalogs.length;

            const countById = stats.catalogStats || {};
            this.catalogs = this.catalogs.map((catalog) => ({
              ...catalog,
              count: countById[catalog.id] || catalog.count
            }));
          } catch (_) {
            this.totalEntries = this.catalogs.reduce((sum, c) => sum + c.count, 0);
            this.totalCatalogs = this.catalogs.length;
          }
        }
      }
    });
  </script>
</body>
</html>
